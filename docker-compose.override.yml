services:
  web:
    build:
      target: dev
    image: aesys.web:dev
    # The Dockerfile sets no ASPNETCORE_ENVIRONMENT — this is the single source of
    # truth for it in local dev, mirroring docker-compose.yml's Production value.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    volumes:
      - ./Aesys.Web:/src/Aesys.Web
      - /src/Aesys.Web/obj
      - /src/Aesys.Web/bin
      - ./Aesys.Core:/src/Aesys.Core
      - /src/Aesys.Core/obj
      - /src/Aesys.Core/bin
      - ./Directory.Packages.props:/src/Directory.Packages.props
      - ./data:/src/Aesys.Web/umbraco/Data
      - umbraco-logs:/src/Aesys.Web/umbraco/Logs
      - umbraco-media:/src/Aesys.Web/wwwroot/media
    command: ["dotnet", "watch", "--non-interactive", "--project", "Aesys.Web/Aesys.Web.csproj", "run", "--no-launch-profile"]

  # The backup sidecar is prod-only. Assigning it a profile nothing activates keeps a bare
  # `docker compose up` from pulling the private GHCR image during local dev. Coolify reads
  # docker-compose.yml directly and never merges this override, so it still runs in prod.
  cloud-cli:
    profiles: ["prod-only"]
