name: release

on:
  workflow_dispatch:
  release:
    types:
      - created

env:
  DOCKER_CONTAINER_REGISTRY: ghcr.io
  DOCKER_METADATA_IMAGE_NAME: ${{ github.repository }}
  DOCKER_METADATA_TAGS: |
    type=sha,format=long
    type=raw,value=latest
  DOCKER_BUILD_PUSH_CONTEXT: "."
  DOCKER_BUILD_PUSH: true

jobs:
  docker-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      -
        uses: actions/checkout@v4
      -
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.DOCKER_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ env.DOCKER_CONTAINER_REGISTRY }}/${{ env.DOCKER_METADATA_IMAGE_NAME }}
          tags: ${{ env.DOCKER_METADATA_TAGS }}
      -
        id: push
        uses: docker/build-push-action@v6.5.0
        with:
          context: ${{ env.DOCKER_BUILD_PUSH_CONTEXT }}
          push: ${{ env.DOCKER_BUILD_PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}