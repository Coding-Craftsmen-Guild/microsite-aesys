name: Sync Claude skills
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Sync skills
        run: mise run skills:sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: skills-sync/${{ github.run_id }}
          title: "chore(skills): daily sync"
          body: |
            Automated sync from sources in `tools/skills-sources.json`.
            Review the lock diff to see which upstream commits advanced.
          commit-message: "chore(skills): daily sync"
          delete-branch: true

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch
