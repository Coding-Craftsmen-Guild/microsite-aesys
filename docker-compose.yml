services:
  web:
    build:
      context: .
      target: runtime
    image: aesys.web:latest
    ports:
      - "28080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    volumes:
      - ./data:/app/umbraco/Data
      - ./usync:/app/uSync
      - umbraco-logs:/app/umbraco/Logs
      - umbraco-media:/app/wwwroot/media
    restart: unless-stopped

volumes:
  umbraco-logs:
  umbraco-media:
