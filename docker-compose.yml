services:
  web:
    build:
      context: .
      target: runtime
    image: 'aesys.web:latest'
    expose:
      - '8080'
    # The Dockerfile deliberately sets no ASPNETCORE_ENVIRONMENT — this is the
    # single source of truth for it locally; Coolify supplies it the same way in prod.
    environment:
      Umbraco__CMS__Global__LocalTempStorage: EnvironmentTemp
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: 'http://+:8080'
    volumes:
      - 'umbraco-data:/app/umbraco/Data'
      - 'umbraco-logs:/app/umbraco/Logs'
      - 'umbraco-media:/app/wwwroot/media'
    restart: unless-stopped
    stop_grace_period: 30s
volumes:
  umbraco-data: null
  umbraco-logs: null
  umbraco-media: null